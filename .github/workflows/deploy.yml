# ─── Auto-deploy Netlify ─────────────────────────────────────────────────────
# Cada push pro main faz:
#   1. Checkout do código
#   2. Instala deps com cache
#   3. Build de produção (npm run build)
#   4. Deploy direto pro Netlify via CLI, em modo --prod
#
# Configuração necessária (secrets do repo — já cadastrados):
#   - NETLIFY_AUTH_TOKEN: personal access token do Netlify
#   - NETLIFY_SITE_ID:    site_id do projeto medodedirigirnuncamais
#
# Pra disparar manualmente: aba "Actions" do GitHub → "Deploy to Netlify"
# → "Run workflow".
# =============================================================================

name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch: # permite acionar manualmente pelo painel do GitHub

# Cancela builds antigos se um novo push chegar pro mesmo branch — sem fila.
concurrency:
  group: netlify-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build production
        run: npm run build
        env:
          NODE_ENV: production
          # Vite só expõe env vars com prefixo VITE_*. Essas três precisam estar
          # presentes no build, senão o cliente Supabase quebra na inicialização
          # ("supabaseUrl is required") e a SPA inteira morre antes de renderizar.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Deploy to Netlify
        # IMPORTANTE: o netlify.toml tem [build] command = "npm run build", e
        # o CLI re-executa esse comando como parte do `deploy --prod`. Por isso
        # as VITE_SUPABASE_* PRECISAM estar no env DESTE step também — senão
        # o rebuild interno do CLI gera um bundle sem essas vars e a app morre
        # com "supabaseUrl is required" no client.
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          # Passa a commit message por ENV (NÃO interpolada com ${{…}} dentro do
          # script) — senão parênteses/aspas/múltiplas linhas quebram o bash
          # ("syntax error near unexpected token"). Também fecha o risco de
          # injeção de shell via mensagem de commit.
          COMMIT_MSG: ${{ github.event.head_commit.message || 'Manual workflow_dispatch' }}
        run: |
          # Só a 1ª linha da mensagem, lida do env de forma segura.
          MSG=$(printf '%s' "$COMMIT_MSG" | head -1)
          npx netlify deploy \
            --prod \
            --dir=dist \
            --site=${{ secrets.NETLIFY_SITE_ID }} \
            --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} \
            --message="$MSG"
